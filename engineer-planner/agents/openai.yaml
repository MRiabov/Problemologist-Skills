interface:
  display_name: "Engineer Planner"
  short_description: "Plan implementation-ready engineering handoffs with formula-driven dimensions."
  default_prompt: "Use this skill when turning benchmark handoff context into planner-owned artifacts. Keep plan.md, todo.md, benchmark_definition.yaml, and assembly_definition.yaml internally consistent; treat benchmark-owned geometry and benchmark_script.py as read-only context; base every size, offset, and clearance on explicit source geometry or formulas; derive moving fixture placement from the declared axis or joint chain; validate cost, weight, and motion contracts; inspect draft renders when available; and submit only when the handoff is implementation-ready."
