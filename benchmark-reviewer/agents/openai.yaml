interface:
  display_name: "Benchmark Reviewer"
  short_description: "Review implemented benchmarks after validation and simulation."
  default_prompt: "Use this skill when validating the implemented benchmark after validation and simulation. Read `benchmark_script.py`, `benchmark_definition.yaml`, `benchmark_assembly_definition.yaml`, `validation_results.json`, `simulation_result.json`, `scene.json`, and any benchmark preview media as read-only; follow the checklist in `SKILL.md` and `references/review_contracts.md`; treat the planner evidence and technical-drawing scripts as the source of the approved benchmark contract; verify geometry, solvability, randomization, motion contracts, and inventory exactness; inspect render or video evidence when present; and write only the stage-scoped benchmark-execution review YAML pair under `reviews/` before submitting the review."
